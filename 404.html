<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Page not found — Rafa Pagés</title>
  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link rel="icon" href="rp.ico">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .error-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7rem 2rem 2rem;
      box-sizing: border-box;
    }
    .error-code {
      font-family: 'Bungee', sans-serif;
      font-size: 8rem;
      line-height: 1;
      color: #f5c842;
      margin-bottom: 1rem;
    }
    .error-message {
      font-size: 1.25rem;
      margin-bottom: 2rem;
      color: #555;
    }
    .error-home-link {
      font-size: 0.9rem;
      font-weight: 400;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .error-home-link:hover {
      color: #2d68f6;
      border-color: #2d68f6;
      text-decoration: none;
    }
    @media (max-width: 576px) {
      .error-section {
        padding-top: 5.5rem;
      }
      .error-code {
        font-size: 5rem;
      }
    }
  </style>
</head>

<body>

<nav class="site-nav" id="site-nav">
  <div class="container">
    <div class="nav-inner">
      <a class="nav-name" href="/">Rafa Pagés</a>
      <div class="nav-links">
        <a href="/#products">Products</a>
        <a href="/research.html">Research</a>
        <a href="/#speaking">Speaking</a>
        <a href="/#contact">Contact</a>
      </div>
    </div>
  </div>
</nav>

<section class="error-section">
  <div>
    <div class="error-code">404</div>
    <p class="error-message">This page doesn't exist (yet?).</p>
    <a href="/" class="error-home-link">Back to home →</a>
  </div>
</section>

<!-- 100% privacy-first analytics -->
<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>

<script>
  window.addEventListener('scroll', function () {
    const nav = document.getElementById('site-nav');
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });
</script>

</body>
</html>
