<script>
Reveal.initialize({
  width: 1920,
  height: 1080,
  margin: 0,
  minScale: 0.1,
  maxScale: 2.0,
  transition: 'fade',
  transitionSpeed: 'fast',
  backgroundTransition: 'none',
  controls: true,
  progress: true,
  slideNumber: true,
  hash: true,
  overview: true,
  keyboard: true,
  touch: true,
});

// Load each iframe on demand so animations fire fresh on every visit
function loadSlide(section) {
  var iframe = section && section.querySelector('iframe[data-src]');
  if (iframe) {
    iframe.src = iframe.dataset.src;
    delete iframe.dataset.src;
  }
}
// Reload already-visited slides so animations replay
function reloadSlide(section) {
  var iframe = section && section.querySelector('iframe');
  if (iframe && iframe.src) iframe.src = iframe.src;
}

Reveal.on('ready',        function(e) { loadSlide(e.currentSlide); });
Reveal.on('slidechanged', function(e) {
  reloadSlide(e.currentSlide);   // replay animations on revisit
  loadSlide(e.currentSlide);     // first visit: move data-src → src
});
</script>

<!-- Simple Analytics — hash mode so each Reveal slide (#/N) is its own pageview -->
