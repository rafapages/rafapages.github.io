<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Demo — Marketing Plan</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .dm-pad {
    position: relative;
    padding: 48px 80px 80px;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    z-index: 2;
    box-sizing: border-box;
  }
  .dm-frame {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
    min-height: 0;
  }
  .dm-frame img {
    max-height: 940px;
    max-width: 1760px;
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    object-position: bottom;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="16 Demo — Marketing Plan">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="slide-brand">AI Tools for Startups</div>

  <div class="dm-pad">
    <!-- <span class="badge">Demo</span> -->
    <div class="dm-frame">
      <img src="../assets/screenshots/demo-marketing.png" alt="ChatGPT generating a marketing plan"/>
    </div>
  </div>

</section>
</div>
</body>
</html>
