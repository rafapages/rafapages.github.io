<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Cover — GenAI for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .cover-pad {
    position: relative;
    padding: 90px 130px 100px;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  /* TOP */
  .cover-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; }
  .meta-stack { display: flex; flex-direction: column; gap: 14px; }
  .course-tag {
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-mid);
  }
  .edition-line {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--fg);
  }
  .edition-line .dot {
    width: 12px; height: 12px;
    background: var(--black);
    border-radius: 4px 12px 8px 14px / 12px 6px 14px 8px;
    transform: rotate(-12deg);
  }
  .doodle-under { width: 200px; margin-top: 2px; }

  /* TITLE */
  .title-wrap { margin-top: -10px; }
  .eyebrow-large {
    font-family: var(--font-display);
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg);
    margin-bottom: 28px;
    display: inline-flex; align-items: center; gap: 16px;
  }
  .eyebrow-large::before {
    content: '';
    width: 60px; height: 4px;
    background: var(--yellow);
    border-radius: 2px 6px 4px 2px;
    transform: rotate(-1deg);
  }
  .big-title {
    font-family: var(--font-display);
    font-size: 3.6rem;            /* 151px */
    line-height: 0.94;
    color: var(--fg);
    letter-spacing: -0.005em;
    display: flex; flex-direction: column;
    gap: 0;
  }
  .big-title .line { display: flex; align-items: baseline; gap: 24px; }
  .big-title .for {
    font-size: 1.8rem;
    color: var(--fg-mid);
    font-family: var(--font-body);
    font-weight: 900;
    font-style: italic;
    transform: rotate(-2deg);
    display: inline-block;
  }
  .big-title .ai { letter-spacing: 0.02em; }
  .big-title .period {
    font-family: var(--font-body);
    font-weight: 900;
    color: var(--yellow-dark);
  }

  /* BOTTOM */
  .cover-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 80px;
  }
  .author-block { display: flex; flex-direction: column; gap: 10px; max-width: 880px; }
  .author-block .by {
    font-family: var(--font-display);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-mid);
  }
  .author-block .name {
    font-family: var(--font-display);
    font-size: 1.9rem;
    line-height: 1;
    color: var(--fg);
  }
  .author-block .role {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--fg-mid);
    line-height: 1.4;
    max-width: 820px;
  }
  .author-block .role strong { color: var(--fg); font-weight: 700; }

  .where-block { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; text-align: right; }
  .where-row { display: flex; flex-direction: column; gap: 2px; }
  .where-row .lbl {
    font-family: var(--font-display);
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  .where-row .val {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--fg);
  }

  /* DECORATIONS */
  .blob-tr {
    position: absolute;
    top: -50px; right: -80px;
    width: 420px; height: 250px;
    z-index: 0;
  }
  .spark-1 {
    position: absolute;
    right: 240px; top: 320px;
    width: 64px;
    z-index: 1;
    transform: rotate(12deg);
  }
  .arrow-doodle {
    position: absolute;
    right: 200px; bottom: 250px;
    width: 220px;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="1 Cover">

  <svg class="blob-tr" viewBox="0 0 340 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M260 8 C310 14 332 60 322 110 C312 160 268 192 210 188 C150 184 96 152 96 100 C96 54 142 22 196 14 C218 10 240 6 260 8Z" fill="#FFE234"/>
  </svg>

  <svg class="spark-1" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M30 4 L30 22 M30 38 L30 56 M4 30 L22 30 M38 30 L56 30 M11 11 L23 23 M37 37 L49 49 M49 11 L37 23 M23 37 L11 49"
          stroke="#111" stroke-width="3" stroke-linecap="round" fill="none"/>
  </svg>

  <svg class="arrow-doodle" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M4 30 Q60 14 130 32 Q180 44 220 28" stroke="#111" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M205 18 L225 28 L210 42" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

  <div class="cover-pad">

    <!-- TOP -->
    <div class="cover-top">
      <div class="meta-stack">
        <div class="course-tag">Startup Lab</div>
        <!-- <div class="edition-line">
          <span class="dot"></span>
          <span>Spring 2026 · Edition 03</span>
        </div> -->
        <svg class="doodle-under" viewBox="0 0 240 14" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 7 Q40 1 80 8 Q120 14 160 6 Q200 0 236 8" stroke="#111" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <!-- <div class="tag solid">Workshop · 2 sessions</div> -->
    </div>

    <!-- TITLE -->
    <div class="title-wrap">
      <div class="eyebrow-large">Tech Bites</div>
      <h1 class="big-title">
        <!-- <span class="line"><span>Generative</span></span> -->
        <span class="line"><span class="ai"><span class="hl">AI</span></span> Tools<span class="for">for</span></span>
        <span class="line"><span>Startups<span class="period">.</span></span></span>
      </h1>
    </div>

    <!-- BOTTOM -->
    <div class="cover-bottom">
      <div class="author-block">
        <!-- <div class="by">Taught by</div> -->
        <div class="name">Rafael Pagés</div>
        <div class="role">
          <!-- <strong>Co-founder &amp; CEO @ Volograms.</strong>
          PhD in Computer Vision. 16 years turning AI &amp; 3D research into products people actually use — from the App Store to global brand campaigns. -->
        </div>
      </div>

      <!-- <div class="where-block">
        <div class="where-row">
          <span class="lbl">Where</span>
          <span class="val">IE Tower · Madrid</span>
        </div>
        <div class="where-row">
          <span class="lbl">Format</span>
          <span class="val">2 × 3-hour sessions</span>
        </div>
      </div> -->
    </div>

  </div>
</section>
</div>
</body>
</html>
