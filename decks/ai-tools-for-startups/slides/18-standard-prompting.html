<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Standard Prompting — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .sp-pad {
    position: relative;
    padding: 80px 160px 140px;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
    z-index: 2;
    box-sizing: border-box;
  }

  .sp-eyebrow {
    display: inline-flex;
    align-items: center;
    width: max-content;
    background: var(--black);
    color: var(--white);
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 14px 26px;
    border-radius: 999px;
    transform: rotate(-1.5deg);
  }

  .sp-headline {
    display: flex;
    flex-direction: column;
    gap: 0;
    line-height: 0.9;
  }
  .sp-word {
    font-family: var(--font-display);
    font-size: 5rem;
    color: var(--fg);
    display: block;
  }

  .sp-sub {
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--fg-mid);
    line-height: 1.55;
    max-width: 840px;
    margin-top: 4px;
  }
  .sp-sub strong { color: var(--fg); font-weight: 700; }

  .sp-doodle {
    position: absolute;
    bottom: 140px;
    right: 160px;
    width: 90px;
    transform: rotate(10deg);
    opacity: 0.65;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="18 Standard Prompting">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="slide-brand">AI Tools for Startups</div>

  <div class="sp-pad">

    <span class="sp-eyebrow">So far, you&rsquo;ve been using&hellip;</span>

    <div class="sp-headline">
      <span class="sp-word"><span class="hl">STANDARD</span></span>
      <span class="sp-word">PROMPTING</span>
    </div>

    <p class="sp-sub">
      One question. One answer. Repeat.<br/>
      That&rsquo;s where 90% of AI users stay.<br> Next, we go further.
    </p>

  </div>

  <svg class="sp-doodle" viewBox="0 0 90 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M6 30 Q18 10 30 30 Q42 50 54 30 Q66 10 74 26 L66 18 M74 26 L68 36" stroke="#111" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </svg>

</section>
</div>
</body>
</html>
