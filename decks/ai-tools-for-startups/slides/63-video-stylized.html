<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Video Example — Stylized — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .full-embed {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none; display: block; z-index: 2;
    background: var(--black);
  }
  .vid-cap {
    position: absolute; left: 32px; bottom: 32px; z-index: 3; pointer-events: none;
    font-family: var(--font-display); font-size: 0.56rem; letter-spacing: 0.06em;
    background: var(--black); color: var(--yellow);
    padding: 9px 16px; border-radius: 8px; transform: rotate(-1.5deg);
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide no-wave" data-screen-label="63 Video example · stylized">
  <iframe class="full-embed"
    src="https://www.youtube-nocookie.com/embed/YS8dn-VJBEU?rel=0&amp;modestbranding=1"
    title="Sincitium — concept trailer (AI-generated)"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen></iframe>
  <span class="vid-cap">Generated · stylized — "Sincitium" concept trailer</span>
</section>
</div>
</body>
</html>
