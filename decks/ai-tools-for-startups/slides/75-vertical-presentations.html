<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Presentations — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .mz-pad {
    position: relative; z-index: 2; box-sizing: border-box;
    width: 100%; height: 100%;
    padding: 96px 120px 92px;
    display: flex; align-items: center; gap: 64px;
  }
  .mz-text { flex: 0 0 34%; display: flex; flex-direction: column; gap: 26px; }
  .mz-cat {
    align-self: flex-start;
    font-family: var(--font-display);
    font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--black); background: var(--yellow);
    padding: 10px 18px; border-radius: 8px; transform: rotate(-1.5deg);
  }
  .mz-head { font-family: var(--font-display); font-size: 2.5rem; line-height: 0.98; color: var(--fg); margin: 0; }
  .mz-line { font-family: var(--font-body); font-size: 1rem; line-height: 1.5; color: var(--fg-mid); margin: 0; }
  .mz-line strong { color: var(--fg); font-weight: 700; }
  .mz-tools {
    font-family: var(--font-display);
    font-size: 0.66rem; letter-spacing: 0.06em; color: var(--fg-muted); margin-top: 4px;
  }

  .mz-media {
    flex: 1; align-self: center; aspect-ratio: 16 / 9; max-height: 100%;
    border: 4px solid var(--black); border-radius: 18px; overflow: hidden;
    background: var(--gray1, #f4f4f4); position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .mz-media img, .mz-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mz-ph {
    font-family: var(--font-display); font-size: 0.78rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--fg-muted); text-align: center; padding: 40px; line-height: 1.5;
  }
  .mz-cap {
    position: absolute; left: 20px; top: 20px; pointer-events: none; z-index: 3;
    font-family: var(--font-display); font-size: 0.56rem; letter-spacing: 0.06em;
    background: var(--black); color: var(--yellow); padding: 8px 14px; border-radius: 8px; transform: rotate(-1.5deg);
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="75 Presentations">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="mz-pad">
    <div class="mz-text">
      <span class="mz-cat">Presentations</span>
      <h1 class="mz-head">Decks that build themselves.</h1>
      <p class="mz-line">An outline goes in, a <strong>designed deck comes out</strong> — drafted, themed and editable. Like this one, but AI-built.</p>
      <div class="mz-tools">e.g. Gamma · Tome</div>
    </div>

    <div class="mz-media">
      <video src="../assets/video/gamma-short.mp4" controls playsinline preload="metadata"></video>
      <span class="mz-cap">Outline in &rarr; deck out</span>
    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
