<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>It Can Get Complicated — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .show-pad { position: relative; padding: 70px 110px 70px; width: 100%; height: 100%;
    display: flex; flex-direction: column; gap: 14px; z-index: 2; }
  .show-title { font-family: var(--font-display); font-size: 1.8rem; line-height: 0.98; color: var(--fg); }
  .show-lede { font-family: var(--font-body); font-size: 0.7rem; color: var(--fg-mid);
    line-height: 1.45; max-width: 70%; }
  .show-lede strong { color: var(--fg); font-weight: 700; }
  .show-canvas { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .show-img { max-width: 100%; max-height: 100%;
     display: block; }
</style>
</head>
<body>
<div class="stage">
<section class="slide no-wave" data-screen-label="81 It Can Get Complicated">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="show-pad">
    <h1 class="show-title">It can get <span class="hl">complicated</span>&hellip;</h1>
    <!-- <p class="show-lede">&hellip;but it really doesn't have to. Start with <strong>one</strong> trigger &rarr; process &rarr; action. This is what happens when you keep saying "and then also&hellip;".</p> -->
    <div class="show-canvas">
      <img class="show-img" src="../assets/images/complicated-automation.jpg" alt="A screenshot of an enormous, sprawling automation workflow with hundreds of connected nodes branching across the canvas, next to a small facepalm video thumbnail"/>
    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
