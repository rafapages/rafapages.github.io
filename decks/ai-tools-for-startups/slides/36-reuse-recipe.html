<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>One recipe, endless uses — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .rc-pad {
    position: relative;
    padding: 110px 140px 100px;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 36px;
    z-index: 2;
    box-sizing: border-box;
  }
  .rc-eyebrow {
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--fg-mid);
  }

  .rc-formula {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 22px;
  }
  .rc-word {
    font-family: var(--font-display);
    font-size: 1.7rem;
    line-height: 1;
    color: var(--fg);
    background: var(--yellow);
    border: 4px solid var(--black);
    border-radius: 14px;
    padding: 14px 22px;
  }
  .rc-word:nth-child(1) { transform: rotate(-1.5deg); }
  .rc-word:nth-child(3) { transform: rotate(1deg); }
  .rc-word:nth-child(5) { transform: rotate(-1deg); }
  .rc-plus {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--fg-muted);
  }
  .rc-coda {
    font-family: var(--font-display);
    font-size: 1.8rem;
    line-height: 1.04;
    color: var(--fg);
  }

  .rc-homework {
    align-self: flex-start;
    background: var(--black);
    color: var(--white);
    border: 4px solid var(--black);
    border-radius: 18px;
    padding: 32px 40px;
    max-width: 980px;
    transform: rotate(-0.5deg);
    display: flex; flex-direction: column;
    gap: 12px;
  }
  .rc-homework .tag {
    font-family: var(--font-display);
    font-size: 0.7rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--yellow);
  }
  .rc-homework p {
    font-family: var(--font-display);
    font-size: 1.15rem;
    line-height: 1.22;
    color: var(--white);
  }

  .rc-blob {
    position: absolute; top: -50px; right: -80px;
    width: 280px; height: 170px; z-index: 0;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="36 One recipe, endless uses">

  <svg class="rc-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="slide-brand">AI Tools for Startups</div>

  <div class="rc-pad">

    <div class="rc-eyebrow">One recipe, endless uses</div>

    <div class="rc-formula">
      <span class="rc-word">Instructions</span>
      <span class="rc-plus">+</span>
      <span class="rc-word">Knowledge</span>
      <span class="rc-plus">+</span>
      <span class="rc-word">Actions</span>
    </div>
    <p class="rc-coda">&hellip; is always the recipe.</p>

    <div class="rc-homework">
      <span class="tag">This week</span>
      <p>Pick one repetitive task you do — and build it once.</p>
    </div>

  </div>
</section>
</div>
</body>
</html>
