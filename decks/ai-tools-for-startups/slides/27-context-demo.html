<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Demo — Context in action — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .dm-pad {
    position: relative;
    padding: 48px 80px 80px;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
    z-index: 2;
    box-sizing: border-box;
  }
  .dm-frame {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 28px;
    width: 100%;
    min-height: 0;
  }
  /* Context1 — the hero, full-height on the left */
  .dm-hero {
    flex: 0 0 40%;
    min-width: 0;
  }
  .dm-hero img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    object-position: bottom center;
  }
  /* Context 2-5 — 2x2 grid on the right, ordered [2|4] / [3|5] */
  .dm-grid {
    flex: 1 1 0;
    min-width: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 24px;
  }
  .dm-grid img {
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    object-fit: contain;
    object-position: bottom center;
    display: block;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="27 Demo — Context">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <!-- <div class="slide-brand">AI Tools for Startups</div> -->

  <div class="dm-pad">
    <!-- <span class="badge">Demo</span> -->
    <div class="dm-frame">
      <div class="dm-hero">
        <img src="../assets/screenshots/Context1.jpeg" alt="ChatGPT given rich context — the full prompt plus lead qualification and score"/>
      </div>
      <div class="dm-grid">
        <img src="../assets/screenshots/Context2.jpeg" alt="Context-prompt continuation (2)"/>
        <img src="../assets/screenshots/Context4.jpeg" alt="Context-prompt continuation (4)"/>
        <img src="../assets/screenshots/Context3.jpeg" alt="Context-prompt continuation (3)"/>
        <img src="../assets/screenshots/Context5.jpeg" alt="Context-prompt continuation (5)"/>
      </div>
    </div>
  </div>

</section>
</div>
</body>
</html>
