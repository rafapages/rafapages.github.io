<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Stop Starting From Scratch — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .si-pad {
    position: relative;
    padding: 110px 140px 96px;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 0;
    z-index: 2;
    box-sizing: border-box;
  }
  .si-eyebrow {
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--fg-mid);
    margin-bottom: 34px;
  }
  .si-title {
    font-family: var(--font-display);
    font-size: 3.2rem;
    line-height: 0.92;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin-bottom: 34px;
  }
  .si-strike { position: relative; display: inline-block; }
  .si-strike::after {
    content: '';
    position: absolute;
    left: -2%; right: -2%; top: 45%;
    height: 14px;
    background: #E22A18;
    border-radius: 10px;
    transform: rotate(-1.6deg);
  }
  .si-sub {
    font-family: var(--font-body);
    font-size: 1.2rem;
    color: var(--fg-mid);
    line-height: 1.5;
    max-width: 1180px;
    margin-bottom: 56px;
  }
  .si-sub strong { color: var(--fg); font-weight: 700; }

  .si-tag {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    gap: 12px;
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--yellow);
    border: 4px solid var(--black);
    border-radius: var(--r-tight);
    padding: 14px 22px;
    transform: rotate(-1.5deg);
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="31 Stop Starting From Scratch">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="slide-brand">AI Tools for Startups</div>

  <div class="si-pad">
    <div class="si-eyebrow">Building with AI · Reusability</div>
    <h1 class="si-title">Stop starting<br/><span class="si-strike">from scratch.</span></h1>
    <p class="si-sub">Every new chat, you re-explain who you are, what you want, and how you like it done. <strong>There's a better way.</strong></p>
    <span class="si-tag">Custom GPTs &amp; Claude Skills</span>
  </div>
</section>
</div>
</body>
</html>
