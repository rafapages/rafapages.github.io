<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Filmmaker Styles — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .dd-pad { position: relative; padding: 56px 90px 56px; width: 100%; height: 100%;
    display: flex; flex-direction: column; gap: 12px; z-index: 2; }
  .dd-title { font-family: var(--font-display); font-size: 1.5rem; line-height: 0.98; color: var(--fg); }
  .dd-title .n { font-family: var(--font-display); font-size: 0.62em; color: var(--fg-muted); margin-right: 14px; }
  .dd-canvas { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .dd-img { max-width: 100%; max-height: 100%; display: block; }
</style>
</head>
<body>
<div class="stage">
<section class="slide no-wave" data-screen-label="57 Filmmaker Styles">

  <svg class="slide-blob" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="dd-pad">
    <h1 class="dd-title"><span class="n">04</span>In the <span class="hl">style of&hellip;</span></h1>
    <div class="dd-canvas">
      <img class="dd-img" src="../assets/images/imggen/dd-filmmakers.jpg" alt="Four filmmaker-style examples, each a 2x2 grid of sample images generated 'in the style of' a named director, with its prompt"/>
    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
