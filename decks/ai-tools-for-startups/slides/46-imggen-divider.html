<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>What Can Be Done — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .div-wrap {
    display: flex; align-items: center; gap: 96px;
    height: 100%; width: 100%;
    padding: 80px 120px;
    z-index: 2; position: relative;
  }
  .div-img {
    max-height: 100%; width: auto; max-width: 46%;
    flex-shrink: 0;
    object-fit: contain;
    border-radius: 18px;
    background: #0e0e0e;
  }
  .div-text { display: flex; flex-direction: column; gap: 18px; }
  .div-eyebrow {
    font-family: var(--font-display);
    font-size: 0.62rem; letter-spacing: 0.2em;
    color: var(--black); background: var(--yellow);
    align-self: flex-start; padding: 8px 18px; border-radius: 8px;
    transform: rotate(-1.5deg);
  }
  .div-title {
    font-family: var(--font-display);
    font-size: 3.1rem; line-height: 0.92; color: var(--fg);
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide no-wave" data-screen-label="46 What Can Be Done">

  <div class="div-wrap">
    <img class="div-img" src="../assets/images/imggen/divider-vader.jpg" alt="A Darth Vader helmet rendered as blue-and-gold porcelain — an AI-generated image"/>
    <div class="div-text">
      <span class="div-eyebrow">Image generation · in practice</span>
      <h1 class="div-title">What <span class="hl"><br>can be</span><br>done</h1>
    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
