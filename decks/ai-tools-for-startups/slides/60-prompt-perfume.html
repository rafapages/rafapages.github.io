<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>The Prompt — Perfume — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .tp-wrap { display: flex; height: 100%; width: 100%; }
  .tp-img { width: 44%; height: 100%; object-fit: cover; display: block; }
  .tp-right {
    flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 26px;
    padding: 90px 120px; position: relative; z-index: 2;
  }
  .tp-tag {
    font-family: var(--font-display); font-size: 0.6rem; letter-spacing: 0.16em;
    text-transform: uppercase; align-self: flex-start;
    border: 3px solid var(--black); border-radius: 999px; padding: 9px 20px; color: var(--fg);
  }
  .tp-quote {
    font-family: var(--font-body); font-weight: 300;
    font-size: 1.7rem; line-height: 1.32; color: var(--fg-mid);
  }
  .tp-quote .mod { font-family: var(--font-display); font-size: 0.72em; color: var(--fg); }
  .tp-note { font-family: var(--font-body); font-size: 0.66rem; color: var(--fg-muted); line-height: 1.5; max-width: 620px; }
  .tp-note strong { color: var(--fg); font-weight: 700; }
</style>
</head>
<body>
<div class="stage">
<section class="slide no-wave" data-screen-label="60 The Prompt · 02">

  <div class="tp-wrap">
    <img class="tp-img" src="../assets/images/imggen/prompt-perfume.jpg" alt="An AI-generated advertising still of a perfume bottle with dramatic shadows and studio lighting"/>
    <div class="tp-right">
      <span class="tp-tag">The prompt</span>
      <p class="tp-quote">"Ladies perfume, <span class="mod">advertising shoot</span>, <span class="mod">shadow effects</span>, <span class="mod">studio light</span>, HD, <span class="mod">ultra detail</span>"</p>
      <p class="tp-note">Now add the modifiers. Each phrase in <strong>bold</strong> is a dial from the last slide &mdash; and each one takes a decision away from the dice.</p>
    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
