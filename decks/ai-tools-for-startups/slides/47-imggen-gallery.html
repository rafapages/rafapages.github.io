<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>A Few Things People Made — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .show-pad {
    position: relative;
    padding: 96px 100px 60px;
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    z-index: 2;
  }
  .show-head { text-align: center; max-width: 1300px; }
  .show-title {
    font-family: var(--font-display);
    font-size: 1.42rem; line-height: 0.98; color: var(--fg);
  }
  .show-lede {
    font-family: var(--font-body);
    font-size: 0.66rem; color: var(--fg-mid); line-height: 1.45;
    max-width: 1100px; margin: 8px auto 0;
  }
  .show-canvas { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .gallery-img {
    max-width: 100%; max-height: 100%;
    border-radius: 14px; display: block;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide no-wave" data-screen-label="47 Capability Gallery">

  <div class="show-pad">
    <div class="show-head">
      <h1 class="show-title">All of this is <span class="hl">one prompt</span> away</h1>
      <p class="show-lede">Photoreal, painterly, product, editorial, 3D, packaging, magazine covers &mdash; the same kind of model made every one of these.</p>
    </div>
    <div class="show-canvas">
      <img class="gallery-img" src="../assets/images/imggen/gallery.jpg" alt="A grid of varied AI-generated images: painted Santa with a soda, iridescent headphones, a delivery truck, a magazine cover, a balloon mask, a leopard candle, a stylised bottle, a mosaic portrait"/>
    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
