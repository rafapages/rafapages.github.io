<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Yet another AI course? — AI Tools for Startups</title>
<link rel="stylesheet" href="../slide.css"/>
<script defer src="../slide-scale.js"></script>
<style>
  .ag-pad {
    position: relative;
    padding: 110px 140px;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    z-index: 2;
  }

  .hook-layout {
    display: grid;
    grid-template-columns: 1fr 460px;
    gap: 100px;
    align-items: center;
    width: 100%;
  }

  .hook-left {
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .ag-eyebrow {
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-mid);
  }

  .ag-title {
    font-family: var(--font-display);
    font-size: 3.8rem;
    line-height: 0.95;
    color: var(--fg);
  }

  .hook-img-frame {
    width: 460px;
    height: 540px;
    border: 6px solid var(--black);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    transform: rotate(1.5deg);
  }

  .hook-img-frame img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .blob-tr {
    position: absolute;
    top: -50px; right: -80px;
    width: 320px; height: 200px;
    z-index: 0;
  }
</style>
</head>
<body>
<div class="stage">
<section class="slide" data-screen-label="3 Yet another AI course">

  <svg class="blob-tr" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M200 10 C248 4 300 30 308 72 C316 114 290 158 248 168 C206 178 156 162 132 128 C108 94 118 44 158 24 C172 16 186 12 200 10Z" fill="#FFE234"/>
  </svg>

  <div class="ag-pad">
    <div class="hook-layout">

      <!-- LEFT: question -->
      <div class="hook-left">
        <div class="ag-eyebrow">Fair question.</div>
        <h1 class="ag-title">
          Yet another<br/>
          <span class="hl">AI course</span>?
        </h1>
      </div>

      <!-- RIGHT: image -->
      <div class="hook-img-frame">
        <img src="../assets/images/facepalm.webp" alt="Facepalm"/>
      </div>

    </div>
  </div>

  <div class="slide-brand">AI Tools for Startups</div>
</section>
</div>
</body>
</html>
